services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SCI_LOG_LEVEL=INFO
      - SCI_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      # Persistent state: db, canonical repo clones, per-task worktrees, journals.
      # Mounted at /srv/data to match BASE_DIR-anchored defaults in
      # app/config.py (WORKDIR is /srv per the Dockerfile) -- no env var
      # overrides needed, the container's own defaults already point here.
      - ./data:/srv/data
      # Synthetic sample repo, mounted read-only; registered as a workspace
      # source via POST /v1/workspaces (we clone from it, never write to it).
      - ./eval/sample_repo:/sample_repo:ro
      # Phase 4: lets the sandbox runner launch sibling containers for
      # verification (docker-outside-of-docker). Unused until Phase 4 but
      # wired up now so docker-compose doesn't need to change later.
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
